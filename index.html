  <title>পরী - Official WhatsApp Channel</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rose: #e8a0a0;
      --deep: #1a0a0a;
      --gold: #c9a96e;
      --blush: #f5e6e6;
      --dark-rose: #8b3a3a;
    }

    body {
      min-height: 100vh;
      background: var(--deep);
      font-family: 'Noto Serif Bengali', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background petals */
    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(139,58,58,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(201,169,110,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(26,10,10,1) 0%, transparent 100%);
      z-index: 0;
    }

    .petal {
      position: fixed;
      width: 8px;
      height: 14px;
      background: rgba(232,160,160,0.15);
      border-radius: 50% 0 50% 0;
      animation: fall linear infinite;
      z-index: 0;
    }

    @keyframes fall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.5; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 60px 50px;
      max-width: 420px;
      width: 90%;
      animation: rise 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .ornament {
      color: var(--gold);
      font-size: 22px;
      letter-spacing: 8px;
      margin-bottom: 24px;
      opacity: 0.7;
      animation: rise 1.2s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    .avatar-ring {
      width: 110px;
      height: 110px;
      margin: 0 auto 28px;
      border-radius: 50%;
      background: conic-gradient(var(--gold), var(--rose), var(--dark-rose), var(--gold));
      padding: 3px;
      animation: spin 8s linear infinite;
      position: relative;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--deep);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      animation: counter-spin 8s linear infinite;
    }

    @keyframes counter-spin {
      to { transform: rotate(-360deg); }
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      font-weight: 700;
      color: var(--blush);
      margin-bottom: 6px;
      text-shadow: 0 0 40px rgba(232,160,160,0.4);
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 30px;
      opacity: 0.8;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 30px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      opacity: 0.4;
    }

    .divider span {
      color: var(--gold);
      font-size: 16px;
      opacity: 0.6;
    }

    .desc {
      color: rgba(245,230,230,0.7);
      font-size: 15px;
      line-height: 1.8;
      margin-bottom: 40px;
    }

    .join-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: white;
      text-decoration: none;
      padding: 16px 36px;
      border-radius: 50px;
      font-family: 'Noto Serif Bengali', serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 30px rgba(37,211,102,0.3);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .join-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .join-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 40px rgba(37,211,102,0.45);
    }

    .join-btn:hover::before { opacity: 1; }

    .join-btn:active { transform: translateY(0); }

    .wa-icon {
      width: 22px;
      height: 22px;
      fill: white;
    }

    .footer-note {
      margin-top: 28px;
      color: rgba(245,230,230,0.3);
      font-size: 12px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div class="bg"></div>

<!-- Falling petals -->
<script>
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.width = (5 + Math.random() * 8) + 'px';
    p.style.height = (8 + Math.random() * 12) + 'px';
    p.style.opacity = Math.random() * 0.3;
    document.body.appendChild(p);
  }
</script>
